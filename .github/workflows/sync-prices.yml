name: Sync Prices from CRM

on:
  # Triggered by the CRM via repository_dispatch
  repository_dispatch:
    types: [sync-prices]
  # Also allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Fetch prices from CRM and patch homes-data.js
        env:
          CRM_URL: https://southern-mhc-crm-production.up.railway.app
          CRM_USER: ${{ secrets.CRM_USER }}
          CRM_PASS: ${{ secrets.CRM_PASS }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, re, os, sys

          crm_url = os.environ["CRM_URL"]
          crm_user = os.environ["CRM_USER"]
          crm_pass = os.environ["CRM_PASS"]

          # Step 1 — login
          login_data = json.dumps({"username": crm_user, "password": crm_pass}).encode()
          req = urllib.request.Request(
              f"{crm_url}/api/auth/login",
              data=login_data,
              headers={"Content-Type": "application/json"},
              method="POST"
          )
          with urllib.request.urlopen(req) as resp:
              cookie = resp.headers.get("Set-Cookie", "")

          # Step 2 — fetch inventory
          req2 = urllib.request.Request(
              f"{crm_url}/api/website/inventory",
              headers={"Cookie": cookie}
          )
          with urllib.request.urlopen(req2) as resp:
              homes = json.loads(resp.read())

          # Build slug -> websitePrice map (only where price exists)
          price_map = {h["slug"]: h["websitePrice"] for h in homes if h.get("websitePrice")}
          print(f"Prices received from CRM: {len(price_map)}")

          # Step 3 — patch homes-data.js
          with open("js/homes-data.js", "r") as f:
              content = f.read()

          updated = 0
          for slug, price in price_map.items():
              pattern = r"(slug:\s*\"" + re.escape(slug) + r"\"(?:(?!slug:).)*?^\s*)(price:\s*)(\d+)"
              match = re.search(pattern, content, re.DOTALL | re.MULTILINE)
              if match:
                  old_price = int(match.group(3))
                  if old_price != price:
                      old_str = match.group(0)
                      new_str = match.group(1) + match.group(2) + str(price)
                      content = content.replace(old_str, new_str, 1)
                      print(f"  Updated {slug}: {old_price} -> {price}")
                      updated += 1

          with open("js/homes-data.js", "w") as f:
              f.write(content)

          print(f"Total updated: {updated}")
          if updated == 0:
              print("No changes needed — exiting cleanly.")
              sys.exit(0)
          PYEOF

      - name: Commit and push if prices changed
        run: |
          git config user.name "smhc-autodeploy[bot]"
          git config user.email "smhc-autodeploy@southernmhcenter.com"
          git add js/homes-data.js
          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No price changes to commit."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "Auto-sync prices from CRM — ${TIMESTAMP}"
            git push
            echo "Prices synced and pushed successfully."
          fi
